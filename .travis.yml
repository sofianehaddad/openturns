language: cpp
dist: trusty
sudo: false

addons:
  apt:
    packages:
    - cmake
    - bison
    - flex
    - swig
    - libmuparser-dev
    - liblapack-dev
    - libxml2-dev
    - libboost-math-dev
    - libtbb-dev
    - python-dev
    - python-scipy
    - python-matplotlib

matrix:
  include:
          #- os: linux
          #compiler: clang
          #env: BUILD_PYTHON=ON
          #- os: linux
          #compiler: clang
          #env: BUILD_PYTHON=OFF
    - os: osx
      osx_image: xcode12.2
      compiler: clang

install:
  # use system python
  - export PATH=/usr/bin:$PATH
  # use latest hmat-oss
  - git clone https://github.com/jeromerobert/hmat-oss.git
  - pushd hmat-oss
  - git checkout 1.6.1
  - if test "$TRAVIS_OS_NAME" = "linux"; then
       cmake -DCMAKE_INSTALL_PREFIX=~/.local
             -DHMAT_DISABLE_OPENMP=OFF . ;
    fi
  - if test "$TRAVIS_OS_NAME" = "osx"; then
       EXTRA_CMAKE_FLAGS="-DCMAKE_CXX_FLAGS=-std=c++11 -DCMAKE_MACOSX_RPATH=ON -DCBLAS_LIBRARIES=/usr/local/opt/openblas/lib/libopenblas.dylib -DBLAS_LIBRARIES=/usr/local/opt/openblas/lib/libopenblas.dylib -DLAPACK_LIBRARIES=/usr/local/opt/openblas/lib/libopenblas.dylib -DCBLAS_INCLUDE_DIR=/usr/local/opt/openblas/include" 
       CMAKE_BUILD_TYPE=Release BUILD_SHARED_LIBS=ON;
       cmake -DCMAKE_INSTALL_PREFIX=~/.local -DBUILD_EXAMPLES=OFF -DBUILD_SHARED_LIBS=$BUILD_SHARED_LIBS -DCMAKE_BUILD_TYPE=$CMAKE_BUILD_TYPE $EXTRA_CMAKE_FLAGS .;
    fi
  - make install -j4
  - popd

script:
  - if test "$TRAVIS_OS_NAME" = "linux"; then
        cmake -DCMAKE_INSTALL_PREFIX=~/.local
              -DUSE_SPHINX=OFF
              -DHMAT_DIR=~/.local/lib/cmake/hmat
              -DUSE_COTIRE=ON
              -DCOTIRE_MAXIMUM_NUMBER_OF_UNITY_INCLUDES="-j2"
              -DBUILD_PYTHON=${BUILD_PYTHON}
              . &&
        make install -j2;
    fi
  - if test "$TRAVIS_OS_NAME" = "osx"; then
        cmake -DCMAKE_INSTALL_PREFIX=~/.local
              -DCMAKE_MACOSX_RPATH=ON
              -DHMAT_DIR=~/.local/lib/cmake/hmat
              -DLAPACK_LIBRARIES="-framework Accelerate"
              -DUSE_COTIRE=ON
              -DCOTIRE_MAXIMUM_NUMBER_OF_UNITY_INCLUDES="-j4"
              . &&
        make install -j4;
    fi
  - if test "${BUILD_PYTHON}" = "OFF"; then
        make tests -j2 && ctest -R cppcheck -j2 --output-on-failure --timeout 100;
    else
        make tests -j2 && ctest -R cppcheck -j4 --output-on-failure --timeout 100;
    fi

after_success:
  - exit 0
  - test "$TRAVIS_PULL_REQUEST" = "false" -a "$TRAVIS_BRANCH" = "master" -a "$TRAVIS_OS_NAME" = "linux" || exit 0
  - git clone https://${GH_TOKEN}@github.com/openturns/openturns.github.io.git
  - cp -r ~/.local/share/openturns/doc/html/* openturns.github.io
  - cd openturns.github.io
  - touch .nojekyll
  - git config user.email "support@travis-ci.com"
  - git config user.name "Travis CI"
  - git add -A .
  - git commit -a -m "Travis build $TRAVIS_BUILD_NUMBER"
  - git push --quiet origin master > /dev/null 2>&1

env:
  global:
    secure: 
